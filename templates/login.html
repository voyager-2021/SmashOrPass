{% extends "base.html" %}

{% block title %}Login - SmashOrPass{% endblock %}

{% block content %}
<div class="w-full max-w-md bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-xl mt-12">
    <h2 class="text-3xl font-extrabold text-center mb-6 bg-gradient-to-r from-pink-500 to-red-500 bg-clip-text text-transparent">Welcome Back!</h2>
    <p class="text-slate-400 text-sm text-center mb-6">Log in to keep voting, save packages, and view your history!</p>

    <form action="{{ url_for('login') }}" method="POST" class="space-y-4">
        <div>
            <label for="username" class="block text-sm font-semibold text-slate-300 mb-1.5">Username</label>
            <input type="text" id="username" name="username" required
                class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition">
        </div>
        <div>
            <label for="password" class="block text-sm font-semibold text-slate-300 mb-1.5">Password</label>
            <input type="password" id="password" name="password" required
                class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition">
        </div>

        <button type="submit"
            class="w-full bg-gradient-to-r from-pink-500 to-red-500 hover:from-pink-600 hover:to-red-600 text-white font-bold py-3 px-4 rounded-xl transition shadow-lg shadow-pink-500/20">
            Login
        </button>
    </form>

    <div class="mt-6 text-center text-sm text-slate-400">
        Don't have an account?
        <a href="{{ url_for('register') }}" class="text-pink-500 hover:underline font-semibold">Sign up here</a>
    </div>
</div>
{% endblock %}
